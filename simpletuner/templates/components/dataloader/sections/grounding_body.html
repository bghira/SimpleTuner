<div class="dataset-subgroup">
    <div class="dataset-subgroup-title">Spatial Grounding</div>
    <div class="row g-3">
        <div class="col-md-6">
            <div class="checkbox-item">
                <div class="form-check">
                    <input class="form-check-input"
                           type="checkbox"
                           :id="`grounding-enabled-${datasetSafeId(dataset)}`"
                           x-model="dataset.grounding.enabled"
                           @change="markAsUnsaved()">
                    <div class="checkbox-content">
                        <label class="form-check-label" :for="`grounding-enabled-${datasetSafeId(dataset)}`">
                            Enable Grounding
                        </label>
                        <div class="form-text">
                            Enable per-entity bounding box annotations for spatial grounding.
                            Requires <code>.bbox</code> sidecar files alongside images.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
