<!-- templates/dataset_captioning_tab.html - CaptionFlow setup and captioning controls -->

<div x-data="datasetCaptioningComponent()" x-init="init()">
    <template x-if="loading">
        <div class="text-center py-5">
            <i class="fas fa-spinner fa-spin fa-2x text-info mb-3 d-block"></i>
            <span class="text-muted">Checking captioning dependencies...</span>
        </div>
    </template>

    <template x-if="!loading && !capabilities.ready">
        <div>
            {% call hero_cta(
                theme='cyan',
                icon_class='fa-closed-captioning',
                icon_shape='rounded',
                title='Captioning',
                description='Install the optional CaptionFlow dependencies to caption datasets from local GPUs through the SimpleTuner job queue.',
                features=[
                    {'icon': 'fa-microchip', 'color': 'text-info', 'label': 'Local GPUs'},
                    {'icon': 'fa-tasks', 'color': 'text-success', 'label': 'Queued jobs'},
                    {'icon': 'fa-file-alt', 'color': 'text-warning', 'label': 'Text captions'},
                ],
                show_condition='true',
                show_dismiss=false,
                cta_primary={'label': 'Copy install command', 'icon': 'fa-copy', 'action': 'copyInstallCommand()'},
                tip_text='Run this in the SimpleTuner virtual environment, then restart the WebUI.'
            ) %}
            <div class="hero-details mt-4">
                <div class="row g-3">
                    <div class="col-12">
                        <div class="hero-detail-card">
                            <h6><i class="fas fa-terminal text-info me-2"></i>Install</h6>
                            <code class="d-block user-select-all" x-text="capabilities.install_command || installCommand"></code>
                        </div>
                    </div>
                </div>
            </div>
            {% endcall %}
        </div>
    </template>

    <template x-if="!loading && capabilities.ready">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1"><i class="fas fa-closed-captioning me-2"></i>Captioning</h5>
                    <p class="text-muted mb-0 small">CaptionFlow jobs use the local GPU job queue.</p>
                </div>
                <span class="badge bg-success">
                    CaptionFlow <span x-text="capabilities.version || 'installed'"></span>
                </span>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs mb-3" role="tablist" aria-label="Captioning job mode">
                    <li class="nav-item" role="presentation">
                        <button type="button"
                                class="nav-link"
                                :class="{ 'active': viewMode === 'builder' }"
                                @click="viewMode = 'builder'">
                            <i class="fas fa-tools me-1"></i> Builder
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button type="button"
                                class="nav-link"
                                :class="{ 'active': viewMode === 'raw' }"
                                @click="viewMode = 'raw'">
                            <i class="fas fa-code me-1"></i> Raw Config
                        </button>
                    </li>
                </ul>

                <template x-if="datasets.length === 0">
                    <div class="alert alert-warning mb-0">
                        <i class="fas fa-exclamation-triangle me-1"></i>
                        No image datasets are available in the active dataloader configuration.
                    </div>
                </template>

                <template x-if="datasets.length > 0">
                    <form @submit.prevent="startCaptioningJob()">
                        <div class="row g-3">
                            <div class="col-lg-6">
                                <label class="form-label">Dataset</label>
                                <select class="form-select" x-model="selectedDatasetId" @change="syncExportModeForDataset()">
                                    <template x-for="dataset in datasets" :key="dataset.dataset_id">
                                        <option :value="dataset.dataset_id"
                                                x-text="`${dataset.dataset_id} (${dataset.total_files || 0} files)`"></option>
                                    </template>
                                </select>
                                <div class="form-text" x-show="selectedDataset() && selectedDataset().config?.instance_data_dir">
                                    <span x-text="selectedDataset().config.instance_data_dir"></span>
                                </div>
                                <div class="form-text" x-show="selectedDatasetBackendType() === 'huggingface'">
                                    Hugging Face dataset captions export to the CaptionFlow job workspace as JSONL.
                                </div>
                            </div>
                            <div class="col-lg-6" x-show="viewMode === 'builder'">
                                <label class="form-label">Model</label>
                                <input type="text" class="form-control" x-model="form.model" :required="viewMode === 'builder'">
                            </div>
                            <div class="col-12" x-show="viewMode === 'builder'">
                                <label class="form-label">Prompt</label>
                                <textarea class="form-control" rows="3" x-model="form.prompt" :required="viewMode === 'builder'"></textarea>
                            </div>
                            <div class="col-12" x-show="viewMode === 'raw'" x-cloak>
                                <label class="form-label">CaptionFlow YAML or JSON</label>
                                <textarea class="form-control font-monospace" rows="20" x-model="rawConfig" spellcheck="false"></textarea>
                            </div>
                            <div class="col-sm-6 col-lg-3">
                                <label class="form-label">Workers</label>
                                <input type="number" min="1" max="32" class="form-control" x-model.number="form.worker_count">
                            </div>
                            <div class="col-sm-6 col-lg-3" x-show="viewMode === 'builder'">
                                <label class="form-label">Batch size</label>
                                <input type="number" min="1" max="256" class="form-control" x-model.number="form.batch_size">
                            </div>
                            <div class="col-sm-6 col-lg-3" x-show="viewMode === 'builder'">
                                <label class="form-label">Chunk size</label>
                                <input type="number" min="1" max="10000" class="form-control" x-model.number="form.chunk_size">
                            </div>
                            <div class="col-sm-6 col-lg-3" x-show="viewMode === 'builder'">
                                <label class="form-label">Max tokens</label>
                                <input type="number" min="1" max="4096" class="form-control" x-model.number="form.max_tokens">
                            </div>
                            <div class="col-sm-6 col-lg-3" x-show="viewMode === 'builder'">
                                <label class="form-label">Temperature</label>
                                <input type="number" min="0" max="2" step="0.05" class="form-control" x-model.number="form.temperature">
                            </div>
                            <div class="col-sm-6 col-lg-3" x-show="viewMode === 'builder'">
                                <label class="form-label">Top P</label>
                                <input type="number" min="0" max="1" step="0.01" class="form-control" x-model.number="form.top_p">
                            </div>
                            <div class="col-sm-6 col-lg-3" x-show="viewMode === 'builder'">
                                <label class="form-label">GPU memory</label>
                                <input type="number" min="0.1" max="0.99" step="0.01" class="form-control" x-model.number="form.gpu_memory_utilization">
                            </div>
                            <div class="col-sm-6 col-lg-3">
                                <label class="form-label">Output field</label>
                                <input type="text" class="form-control" x-model="form.output_field" required>
                            </div>
                            <div class="col-12 d-flex flex-wrap gap-3 align-items-center">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="captioning-any-gpu" x-model="form.any_gpu">
                                    <label class="form-check-label" for="captioning-any-gpu">Use any available GPU</label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="captioning-export-text"
                                           x-model="form.export_textfiles"
                                           :disabled="!selectedDatasetSupportsTextfileExport()">
                                    <label class="form-check-label" for="captioning-export-text">Export text files</label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="captioning-no-wait" x-model="form.no_wait">
                                    <label class="form-check-label" for="captioning-no-wait">Reject instead of queue</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <div>
                                <div class="alert alert-success py-2 px-3 mb-0" x-show="submitMessage" x-cloak>
                                    <i class="fas fa-check-circle me-1"></i>
                                    <span x-text="submitMessage"></span>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" :disabled="submitting || !selectedDatasetId">
                                <i class="fas" :class="submitting ? 'fa-spinner fa-spin' : 'fa-play'"></i>
                                <span x-text="submitting ? 'Starting...' : 'Start Captioning Job'"></span>
                            </button>
                        </div>
                    </form>
                </template>
                <div class="mt-4" x-show="capabilities.ready" x-cloak>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0"><i class="fas fa-tasks me-2"></i>Status</h6>
                        <button type="button" class="btn btn-sm btn-outline-secondary" @click="loadCaptionJobs()">
                            <i class="fas fa-sync-alt me-1"></i> Refresh
                        </button>
                    </div>
                    <template x-if="captionJobs.length === 0">
                        <div class="text-muted small">No captioning jobs yet.</div>
                    </template>
                    <template x-if="captionJobs.length > 0">
                        <div class="row g-3">
                            <div class="col-lg-4">
                                <div class="list-group">
                                    <template x-for="job in captionJobs" :key="job.job_id">
                                        <button type="button"
                                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
                                                :class="{ 'active': job.job_id === activeJobId }"
                                                @click="selectCaptionJob(job.job_id)">
                                            <span class="me-2">
                                                <span class="d-block fw-semibold" x-text="captionJobLabel(job)"></span>
                                                <span class="small" x-text="formatJobTime(job.started_at || job.queued_at || job.created_at)"></span>
                                            </span>
                                            <span class="badge" :class="captionJobStatusClass(job.status)" x-text="job.status"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                            <div class="col-lg-8">
                                <div class="border rounded p-3 bg-dark text-light">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <div>
                                            <span class="fw-semibold" x-text="captionJobLabel(activeCaptionJob())"></span>
                                            <span class="badge ms-2" :class="captionJobStatusClass(activeCaptionJob()?.status)" x-text="activeCaptionJob()?.status || ''"></span>
                                        </div>
                                        <span class="small text-muted" x-text="activeCaptionJob()?.output_url || ''"></span>
                                    </div>
                                    <pre class="mb-0 small text-light"
                                         x-ref="captioningLogViewer"
                                         @scroll="handleLogScroll()"
                                         style="max-height: 320px; overflow: auto; white-space: pre-wrap;"
                                         x-text="jobLogs || '(No log output yet)'"></pre>
                                </div>
                            </div>
                        </div>
                    </template>
                    <div class="alert alert-warning mt-3 mb-0" x-show="jobStatusError" x-cloak>
                        <i class="fas fa-exclamation-triangle me-1"></i>
                        <span x-text="jobStatusError"></span>
                    </div>
                </div>
                <div class="alert alert-danger mt-3 mb-0" x-show="error" x-cloak>
                    <i class="fas fa-exclamation-triangle me-1"></i>
                    <span x-text="error"></span>
                </div>
            </div>
        </div>
    </template>

    <template x-if="!loading && error && !capabilities.ready">
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-triangle me-1"></i>
            <span x-text="error"></span>
        </div>
    </template>
</div>
